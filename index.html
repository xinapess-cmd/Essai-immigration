<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldGate — Immigration Afrique → Turquie</title>
  <meta name="description" content="WorldGate - Spécialiste immigration Afrique vers Turquie. Visa tourisme, travail, études, familial. 95% de réussite. 1,200+ Africains aidés." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-router-dom@6.3.0/dist/umd/react-router-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{
      --primary:#E30A17;--primary-dark:#b30813;--secondary:#0066CC;--secondary-dark:#0052a3;
      --accent:#FF6600;--accent-dark:#cc5200;--white:#FFFFFF;
      --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;
      --gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;
      --gray-800:#1F2937;--gray-900:#111827;
      --success:#10B981;--warning:#F59E0B;--danger:#EF4444;
      --shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow:0 4px 6px rgba(0,0,0,.07);
      --shadow-md:0 6px 20px rgba(0,0,0,.1);--shadow-lg:0 20px 40px rgba(0,0,0,.12);
      --radius:8px;--radius-lg:16px;--radius-xl:24px;--transition:all .3s ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;font-size:16px}
    body{font-family:'Inter',sans-serif;color:var(--gray-800);background:var(--white);line-height:1.6;overflow-x:hidden}
    h1,h2,h3,h4,h5,h6{font-family:'Poppins',sans-serif;font-weight:700;line-height:1.2;color:var(--gray-900)}
    a{text-decoration:none;color:inherit}img{max-width:100%;height:auto;display:block}ul{list-style:none}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border-radius:var(--radius);font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;cursor:pointer;border:none;transition:var(--transition);white-space:nowrap}
    .btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 15px rgba(227,10,23,.3)}
    .btn-primary:hover{background:var(--primary-dark);transform:translateY(-2px)}
    .btn-secondary{background:var(--secondary);color:#fff;box-shadow:0 4px 15px rgba(0,102,204,.3)}
    .btn-secondary:hover{background:var(--secondary-dark);transform:translateY(-2px)}
    .btn-cta{background:var(--accent);color:#fff;box-shadow:0 4px 20px rgba(255,102,0,.4);font-size:16px;padding:14px 32px}
    .btn-cta:hover{background:var(--accent-dark);transform:translateY(-2px)}
    .btn-outline{background:transparent;border:2px solid #fff;color:#fff}
    .btn-outline:hover{background:#fff;color:var(--primary)}
    .btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.3)}
    .btn-ghost:hover{background:rgba(255,255,255,.2)}
    .btn-sm{padding:8px 18px;font-size:13px}.btn-lg{padding:16px 40px;font-size:17px}
    .card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:28px;transition:var(--transition)}
    .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
    .card-bordered{border:1px solid var(--gray-200);box-shadow:var(--shadow-sm)}
    .card-bordered:hover{border-color:var(--primary)}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    .section{padding:80px 0}
    .section-header{text-align:center;margin-bottom:56px}
    .section-header h2{font-size:clamp(28px,4vw,42px);margin-bottom:16px}
    .section-header p{font-size:18px;color:var(--gray-500);max-width:600px;margin:0 auto}
    .section-title-accent{background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
    .w-full{width:100%}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;font-family:'Poppins',sans-serif}
    .badge-success{background:#D1FAE5;color:#065F46}.badge-warning{background:#FEF3C7;color:#92400E}
    .badge-danger{background:#FEE2E2;color:#991B1B}.badge-info{background:#DBEAFE;color:#1E40AF}
    .badge-primary{background:#FEE2E2;color:var(--primary)}
    .stat-card{background:#fff;border-radius:var(--radius-lg);padding:28px 24px;text-align:center;box-shadow:var(--shadow-md);border-bottom:4px solid var(--primary);transition:var(--transition)}
    .stat-card:hover{transform:translateY(-4px)}
    .stat-num{font-family:'Poppins',sans-serif;font-size:42px;font-weight:800;color:var(--primary);line-height:1}
    .stat-label{font-size:15px;color:var(--gray-500);margin-top:8px;font-weight:500}
    .progress-bar{background:var(--gray-200);border-radius:99px;height:8px;overflow:hidden}
    .progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width 1s ease}
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
    .form-label{font-size:14px;font-weight:600;color:var(--gray-700);font-family:'Poppins',sans-serif}
    .form-control{width:100%;padding:12px 16px;border:2px solid var(--gray-200);border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:15px;color:var(--gray-800);transition:var(--transition);background:#fff;outline:none}
    .form-control:focus{border-color:var(--secondary);box-shadow:0 0 0 3px rgba(0,102,204,.1)}
    .alert{padding:14px 18px;border-radius:var(--radius);display:flex;align-items:flex-start;gap:12px;font-size:14px;margin-bottom:16px}
    .alert-success{background:#D1FAE5;color:#065F46;border-left:4px solid var(--success)}
    .alert-warning{background:#FEF3C7;color:#92400E;border-left:4px solid var(--warning)}
    .alert-danger{background:#FEE2E2;color:#991B1B;border-left:4px solid var(--danger)}
    .alert-info{background:#DBEAFE;color:#1E40AF;border-left:4px solid var(--secondary)}
    .tabs-nav{display:flex;border-bottom:2px solid var(--gray-200);margin-bottom:32px;overflow-x:auto}
    .tab-btn{padding:14px 28px;font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;color:var(--gray-500);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:var(--transition);white-space:nowrap}
    .tab-btn:hover{color:var(--primary)}.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
    .accordion-item{border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
    .accordion-header{padding:18px 24px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:'Poppins',sans-serif;font-weight:600;font-size:16px;color:var(--gray-800);transition:var(--transition)}
    .accordion-header:hover{background:var(--gray-50)}.accordion-header.open{color:var(--primary);background:#FFF5F5}
    .accordion-body{padding:0 24px;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease}
    .accordion-body.open{padding:16px 24px 24px;max-height:600px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px}
    .modal-content{background:#fff;border-radius:var(--radius-xl);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 30px 60px rgba(0,0,0,.2)}
    .whatsapp-float{position:fixed;bottom:28px;left:28px;width:60px;height:60px;border-radius:50%;background:#25D366;color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.5);z-index:999;transition:var(--transition);animation:pulse 2s infinite}
    .whatsapp-float:hover{transform:scale(1.1)}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.4)}50%{box-shadow:0 0 0 15px rgba(37,211,102,0)}}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    .hero{min-height:100vh;position:relative;display:flex;align-items:center;overflow:hidden}
    .hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(227,10,23,.92),rgba(0,30,80,.9));z-index:1}
    .hero-bg-img{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;z-index:0;opacity:.35}
    .hero-content{position:relative;z-index:2;color:#fff}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.3);padding:8px 18px;border-radius:99px;font-size:13px;font-weight:600;margin-bottom:24px;font-family:'Poppins',sans-serif}
    .hero h1{font-size:clamp(28px,4.5vw,58px);font-weight:800;color:#fff;margin-bottom:20px;line-height:1.1}
    .hero p{font-size:clamp(16px,2vw,20px);color:rgba(255,255,255,.9);margin-bottom:36px;max-width:600px;line-height:1.7}
    .hero-buttons{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:48px}
    .hero-stats{display:flex;flex-wrap:wrap;gap:24px}
    .hero-stat{display:flex;align-items:center;gap:12px}
    .hero-stat-icon{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:18px}
    .hero-stat .num{font-family:'Poppins',sans-serif;font-weight:700;font-size:20px;color:#fff;line-height:1}
    .hero-stat .label{font-size:12px;color:rgba(255,255,255,.7);line-height:1.3}
    .bg-gray{background:var(--gray-50)}
    .cta-section{background:linear-gradient(135deg,var(--primary),#b30813 50%,#001a4d);padding:80px 0;text-align:center;color:#fff;position:relative;overflow:hidden}
    .testimonial-card{background:#fff;border-radius:var(--radius-xl);padding:32px;box-shadow:var(--shadow-md);position:relative}
    .testimonial-avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;border:3px solid var(--primary)}
    .stars{color:#F59E0B;font-size:14px}
    .video-placeholder{background:var(--gray-900);border-radius:var(--radius-lg);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:var(--transition)}
    .video-play-btn{width:64px;height:64px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--primary)}
    .comparison-table{width:100%;border-collapse:collapse;font-size:15px}
    .comparison-table th,.comparison-table td{padding:16px 20px;text-align:left;border-bottom:1px solid var(--gray-200)}
    .comparison-table th{background:var(--gray-50);font-family:'Poppins',sans-serif;font-weight:600;color:var(--gray-700);font-size:14px}
    .checklist-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--gray-100)}
    .timeline-step{display:flex;gap:24px;position:relative;padding-bottom:48px}
    .timeline-circle{width:60px;height:60px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative;z-index:1}
    .dashboard-layout{display:flex;min-height:100vh;background:var(--gray-100)}
    .dashboard-sidebar{width:260px;background:var(--gray-900);color:#fff;padding:28px 0;display:flex;flex-direction:column;flex-shrink:0}
    .sidebar-nav-item{display:flex;align-items:center;gap:14px;padding:14px 24px;color:rgba(255,255,255,.6);cursor:pointer;transition:var(--transition);font-size:14px;font-weight:500;border-left:3px solid transparent}
    .sidebar-nav-item:hover,.sidebar-nav-item.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:var(--primary)}
    .sidebar-nav-item i{width:20px}
    .dashboard-main{flex:1;padding:32px;overflow-y:auto}
    .dashboard-widget{background:#fff;border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-sm)}
    .widget-title{font-family:'Poppins',sans-serif;font-size:17px;font-weight:700;color:var(--gray-900);margin-bottom:20px;display:flex;align-items:center;gap:10px}
    .chat-container{height:300px;overflow-y:auto;padding:16px;background:var(--gray-50);border-radius:var(--radius);margin-bottom:16px}
    .chat-msg{display:flex;gap:10px;margin-bottom:16px}.chat-msg.own{flex-direction:row-reverse}
    .chat-bubble{max-width:70%;padding:10px 16px;border-radius:18px;font-size:14px;line-height:1.5;background:#fff}
    .chat-msg.own .chat-bubble{background:var(--primary);color:#fff}
    nav.desktop-nav a{padding:8px 14px;border-radius:6px;font-size:14px;font-weight:600;font-family:'Poppins';white-space:nowrap}
    @media(max-width:900px){.desktop-nav{display:none!important}.hamburger-btn{display:flex!important}}
    @media(max-width:1024px){.grid-4{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:768px){.section{padding:56px 0}.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.hero-buttons{flex-direction:column}.hero-buttons .btn{width:100%}.dashboard-layout{flex-direction:column}.dashboard-sidebar{width:100%}.two-col{grid-template-columns:1fr!important}}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, createContext, useContext } = React;
    const { HashRouter, Routes, Route, Link, useLocation, useNavigate } = ReactRouterDOM;

    /* ============ AUTH CONTEXT ============ */
    const AuthContext = createContext(null);
    const MOCK_USER = { id:1, email:'demo@worldgate.com', name:'Jean Dupont', nationality:'Bénin', phone:'+229 97 00 00 00', photo:'https://ui-avatars.com/api/?name=Jean+Dupont&background=E30A17&color=fff&size=150', visaType:'Visa Travail', createdAt:'2026-05-01' };
    function AuthProvider({children}){
      const [user,setUser]=useState(()=>{try{const s=localStorage.getItem('wg_user');return s?JSON.parse(s):null}catch{return null}});
      const login=(email,password)=>{
        if(email==='demo@worldgate.com'&&password==='demo123'){setUser(MOCK_USER);localStorage.setItem('wg_user',JSON.stringify(MOCK_USER));return{success:true}}
        if(email&&password.length>=6){const u={...MOCK_USER,email,name:email.split('@')[0],photo:`https://ui-avatars.com/api/?name=${encodeURIComponent(email)}&background=E30A17&color=fff&size=150`};setUser(u);localStorage.setItem('wg_user',JSON.stringify(u));return{success:true}}
        return{success:false,error:'Email ou mot de passe incorrect'}
      };
      const register=(d)=>{const u={...MOCK_USER,...d,photo:`https://ui-avatars.com/api/?name=${encodeURIComponent(d.name)}&background=E30A17&color=fff&size=150`};setUser(u);localStorage.setItem('wg_user',JSON.stringify(u));return{success:true}};
      const logout=()=>{setUser(null);localStorage.removeItem('wg_user')};
      return <AuthContext.Provider value={{user,isAuthenticated:!!user,login,register,logout}}>{children}</AuthContext.Provider>;
    }
    const useAuth=()=>useContext(AuthContext);

    /* ============ HEADER ============ */
    const navLinks=[{label:'Accueil',path:'/'},{label:'Services',path:'/services'},{label:'Visa Turquie',path:'/visa'},{label:'Processus',path:'/processus'},{label:'Community',path:'/community'},{label:'Blog',path:'/blog'},{label:'Contact',path:'/contact'}];
    function Header(){
      const [scrolled,setScrolled]=useState(false);const [open,setOpen]=useState(false);const [lang,setLang]=useState('FR');
      const {pathname}=useLocation();const {isAuthenticated,user,logout}=useAuth();
      useEffect(()=>{const s=()=>setScrolled(window.scrollY>20);window.addEventListener('scroll',s);return()=>window.removeEventListener('scroll',s)},[]);
      useEffect(()=>{setOpen(false)},[pathname]);
      const isHome=pathname==='/';const light=scrolled||!isHome;
      const txt=light?'var(--gray-800)':'white';
      return <header style={{position:'fixed',top:0,left:0,right:0,zIndex:100,background:light?'rgba(255,255,255,.98)':'transparent',boxShadow:scrolled?'0 2px 20px rgba(0,0,0,.08)':'none',backdropFilter:scrolled?'blur(10px)':'none',transition:'all .3s'}}>
        <div className="container"><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:72,gap:24}}>
          <Link to="/" style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:40,height:40,background:'linear-gradient(135deg,var(--primary),var(--secondary))',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🌍</div>
            <div><div style={{fontFamily:'Poppins',fontWeight:800,fontSize:20,color:light?'var(--primary)':'white',lineHeight:1}}>WorldGate</div><div style={{fontSize:10,color:light?'var(--gray-400)':'rgba(255,255,255,.7)',lineHeight:1,marginTop:2}}>Afrique → Turquie</div></div>
          </Link>
          <nav className="desktop-nav" style={{display:'flex',alignItems:'center',gap:4,flex:1,justifyContent:'center'}}>
            {navLinks.map(l=><Link key={l.path} to={l.path} style={{color:pathname===l.path?'var(--primary)':txt,background:pathname===l.path?'rgba(227,10,23,.08)':'transparent'}}>{l.label}</Link>)}
          </nav>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button onClick={()=>setLang(l=>l==='FR'?'EN':'FR')} style={{background:'transparent',border:`1px solid ${light?'var(--gray-300)':'rgba(255,255,255,.4)'}`,color:txt,padding:'6px 12px',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'Poppins'}}>{lang}</button>
            {isAuthenticated?<div style={{display:'flex',alignItems:'center',gap:8}}>
              <Link to="/portail" style={{display:'flex',alignItems:'center',gap:8}}><img src={user.photo} style={{width:36,height:36,borderRadius:'50%',border:'2px solid var(--primary)'}}/><span style={{fontSize:14,fontWeight:600,color:txt}}>{user.name.split(' ')[0]}</span></Link>
              <button onClick={logout} className="btn btn-sm" style={{background:'transparent',border:`1px solid ${light?'var(--gray-300)':'rgba(255,255,255,.4)'}`,color:txt}}><i className="fas fa-sign-out-alt"></i></button>
            </div>:<React.Fragment>
              <Link to="/portail" className="btn btn-sm" style={{background:'transparent',border:`1.5px solid ${light?'var(--secondary)':'rgba(255,255,255,.7)'}`,color:light?'var(--secondary)':'white'}}>Connexion</Link>
              <Link to="/portail" className="btn btn-sm btn-primary">Créer un compte</Link>
            </React.Fragment>}
            <button className="hamburger-btn" onClick={()=>setOpen(o=>!o)} style={{background:'transparent',border:'none',cursor:'pointer',color:txt,fontSize:22,display:'none',padding:8}}><i className={`fas ${open?'fa-times':'fa-bars'}`}></i></button>
          </div>
        </div></div>
        {open&&<div style={{background:'#fff',borderTop:'1px solid var(--gray-200)',padding:'16px 24px',boxShadow:'0 8px 30px rgba(0,0,0,.1)'}}>
          {navLinks.map(l=><Link key={l.path} to={l.path} style={{display:'block',padding:'12px 8px',borderBottom:'1px solid var(--gray-100)',fontSize:15,fontWeight:600,fontFamily:'Poppins',color:pathname===l.path?'var(--primary)':'var(--gray-700)'}}>{l.label}</Link>)}
          <div style={{display:'flex',gap:12,marginTop:16}}><Link to="/portail" className="btn btn-secondary w-full">Connexion</Link><Link to="/portail" className="btn btn-primary w-full">Compte</Link></div>
        </div>}
      </header>;
    }

    /* ============ FOOTER ============ */
    function Footer(){
      const year=new Date().getFullYear();
      const social=[{i:'fab fa-facebook-f',h:'#'},{i:'fab fa-instagram',h:'#'},{i:'fab fa-whatsapp',h:'https://wa.me/22900000000'},{i:'fab fa-youtube',h:'#'},{i:'fab fa-tiktok',h:'#'}];
      return <footer style={{background:'var(--gray-900)',color:'rgba(255,255,255,.7)',padding:'72px 0 32px'}}>
        <div className="container">
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:48,marginBottom:56}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}><div style={{width:44,height:44,background:'linear-gradient(135deg,var(--primary),var(--secondary))',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>🌍</div><div><div style={{fontFamily:'Poppins',fontWeight:800,fontSize:20,color:'#fff'}}>WorldGate</div><div style={{fontSize:11,color:'rgba(255,255,255,.5)'}}>Afrique → Turquie</div></div></div>
              <p style={{fontSize:14,lineHeight:1.7,marginBottom:20,maxWidth:260}}>Spécialiste UNIQUE immigration Afrique → Turquie. 95% de réussite. 1,200+ Africains aidés depuis Cotonou.</p>

            {sec==='overview'&&<div><div style={{background:'linear-gradient(135deg,var(--primary),var(--secondary))',borderRadius:16,padding:28,marginBottom:24,color:'#fff'}}><div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}><img src={user.photo} style={{width:64,height:64,borderRadius:'50%',border:'3px solid rgba(255,255,255,.4)'}}/><div style={{flex:1}}><h2 style={{color:'#fff',fontFamily:'Poppins',fontSize:22,marginBottom:4}}>Bienvenue, {user.name.split(' ')[0]} ! 👋</h2><p style={{color:'rgba(255,255,255,.85)'}}>🌍 {user.nationality} → 🇹🇷 Turquie • {user.visaType}</p></div></div></div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:16,marginBottom:24}}>{[['Documents',`${done}/${MOCK_DOCS.length}`,'📄','var(--secondary)'],['Progression',`${Math.round(done/MOCK_DOCS.length*100)}%`,'📊','var(--accent)'],['Délai prévu','2–3 mois','⏱️','var(--success)'],['Réussite','90%','🎯','var(--primary)']].map(k=><div key={k[0]} style={{background:'#fff',border:'1px solid var(--gray-200)',borderRadius:12,padding:20,borderLeft:`4px solid ${k[3]}`}}><div style={{fontSize:28,marginBottom:8}}>{k[2]}</div><div style={{fontFamily:'Poppins',fontWeight:800,fontSize:24,color:k[3]}}>{k[1]}</div><div style={{fontSize:13,color:'var(--gray-500)'}}>{k[0]}</div></div>)}</div><div style={{background:'#fff',border:'1px solid var(--gray-200)',borderRadius:16,padding:24}}><h3 style={{fontFamily:'Poppins',fontWeight:700,marginBottom:16}}>Progression documents</h3><div className="progress-bar" style={{height:10,marginBottom:16}}><div className="progress-fill" style={{width:(done/MOCK_DOCS.length*100)+'%'}}></div></div>{MOCK_DOCS.map((d,i)=><div key={i} className="checklist-item"><span style={{fontSize:20}}>{d[1]==='done'?'✅':d[1]==='pending'?'⏳':'❌'}</span><span style={{flex:1,fontSize:14,fontWeight:600}}>{d[0]}</span>{d[3]&&<span style={{fontSize:12,color:'var(--gray-400)'}}>{d[3]}</span>}</div>)}</div></div>}
            {sec==='status'&&<div><div className="widget-title"><i className="fas fa-clipboard-list"></i> Statut de votre dossier</div><div style={{background:'linear-gradient(135deg,#FFF5F5,#EFF6FF)',borderRadius:16,padding:28}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:24}}><div><h3 style={{fontFamily:'Poppins',fontSize:20}}>Visa Travail — Turquie</h3><p style={{color:'var(--gray-500)',fontSize:14}}>Dossier N° WG-2026-1247</p></div><span className="badge badge-warning" style={{padding:'8px 16px'}}>⚙️ En traitement</span></div>{STATUS.map((s,i)=><div key={i} style={{display:'flex',gap:16,marginBottom:20,position:'relative'}}>{i<STATUS.length-1&&<div style={{position:'absolute',left:20,top:40,bottom:-20,width:2,background:s[2]==='done'?'var(--success)':'var(--gray-200)'}}></div>}<div style={{width:40,height:40,borderRadius:'50%',background:s[2]==='done'?'var(--success)':s[2]==='active'?'var(--accent)':'var(--gray-100)',color:s[2]?'#fff':'var(--gray-400)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,position:'relative',zIndex:1}}><i className={s[2]==='done'?'fas fa-check':s[1]}></i></div><div style={{paddingTop:8}}><div style={{fontFamily:'Poppins',fontWeight:700,color:s[2]==='done'?'var(--success)':s[2]==='active'?'var(--accent)':'var(--gray-500)'}}>{s[0]}</div><div style={{fontSize:13,color:'var(--gray-400)'}}>{s[2]==='done'?'Complété ✓':s[2]==='active'?'En cours — 2–3 mois':'À venir'}</div></div></div>)}</div><div className="alert alert-info" style={{marginTop:24}}><i className="fas fa-circle-info"></i><span>Décision prévue le <strong>15 août 2026</strong>. Notifié par email + SMS.</span></div></div>}
            {sec==='documents'&&<div><div className="widget-title"><i className="fas fa-folder"></i> Mes documents</div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:16}}>{MOCK_DOCS.map((d,i)=><div key={i} style={{border:'2px solid var(--gray-200)',background:d[1]==='done'?'#F0FDF4':d[1]==='missing'?'#FFF5F5':'var(--gray-50)',borderRadius:12,padding:20,textAlign:'center'}}><div style={{fontSize:40,marginBottom:10}}>{d[2]}</div><div style={{fontFamily:'Poppins',fontWeight:700,fontSize:13,marginBottom:4}}>{d[0]}</div>{d[3]?<div style={{fontSize:11,color:'var(--gray-400)',marginBottom:12}}>{d[3]}</div>:<div style={{fontSize:11,color:'var(--danger)',marginBottom:12}}>Non uploadé</div>}<button className="btn btn-sm btn-primary w-full" style={{fontSize:11}}>{d[1]==='done'?'⬇ Télécharger':'⬆ Upload'}</button></div>)}</div></div>}
            {sec==='messages'&&<div><div className="widget-title"><i className="fas fa-comments"></i> Messages</div><div className="chat-container">{msgs.map((m,i)=><div key={i} className={`chat-msg ${m.from==='me'?'own':''}`}>{m.from!=='me'&&<div style={{width:36,height:36,borderRadius:'50%',background:'var(--primary)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>A</div>}<div><div style={{fontSize:11,color:'var(--gray-400)',marginBottom:4}}>{m.name}</div><div className="chat-bubble">{m.msg}</div></div></div>)}</div><form onSubmit={send} style={{display:'flex',gap:10}}><input className="form-control" placeholder="Écrivez votre message..." value={nm} onChange={e=>setNm(e.target.value)} style={{flex:1}}/><button type="submit" className="btn btn-primary"><i className="fas fa-paper-plane"></i></button></form></div>}
            {sec==='calculator'&&<div><div className="widget-title"><i className="fas fa-calculator"></i> Mon budget estimé</div><CostCalculator compact/></div>}
            {sec==='ai-checker'&&<div><div className="widget-title"><i className="fas fa-robot"></i> AI Document Checker</div><DocumentChecker/></div>}
            {sec==='profile'&&<div><div className="widget-title"><i className="fas fa-user-cog"></i> Mon profil</div><div style={{display:'flex',gap:24,alignItems:'flex-start',flexWrap:'wrap'}}><img src={user.photo} style={{width:120,height:120,borderRadius:'50%',border:'4px solid var(--primary)'}}/><div style={{flex:1,minWidth:240}}>{[['Nom complet',user.name,'fas fa-user'],['Email',user.email,'fas fa-envelope'],['Nationalité',user.nationality,'fas fa-flag'],['Type de visa',user.visaType,'fas fa-passport']].map(f=><div key={f[0]} style={{display:'flex',gap:16,padding:'14px 0',borderBottom:'1px solid var(--gray-100)'}}><i className={f[2]} style={{color:'var(--secondary)',width:20,marginTop:3}}></i><div><div style={{fontSize:12,color:'var(--gray-400)'}}>{f[0]}</div><div style={{fontWeight:600}}>{f[1]}</div></div></div>)}<button onClick={logout} className="btn btn-sm" style={{marginTop:20,background:'#FEE2E2',color:'var(--danger)'}}><i className="fas fa-sign-out-alt"></i> Déconnexion</button></div></div></div>}
          </div>
        </main>
      </div>;
    }
    function Portal(){const {isAuthenticated}=useAuth();return isAuthenticated?<Dashboard/>:<AuthForm/>;}

    /* ============ APP ============ */
    function ScrollTop(){const {pathname}=useLocation();useEffect(()=>{window.scrollTo(0,0)},[pathname]);return null;}
    function Layout({children,footer=true}){return <React.Fragment><Header/><main>{children}</main>{footer&&<Footer/>}<WhatsAppFloat/></React.Fragment>;}
    function App(){
      return <AuthProvider><ScrollTop/><Routes>
        <Route path="/" element={<Layout><Home/></Layout>}/>
        <Route path="/services" element={<Layout><Services/></Layout>}/>
        <Route path="/visa" element={<Layout><Visa/></Layout>}/>
        <Route path="/checklist" element={<Layout><Checklist/></Layout>}/>
        <Route path="/processus" element={<Layout><Process/></Layout>}/>
        <Route path="/portail" element={<Layout footer={false}><Portal/></Layout>}/>
        <Route path="/community" element={<Layout><Community/></Layout>}/>
        <Route path="/blog" element={<Layout><Blog/></Layout>}/>
        <Route path="/contact" element={<Layout><Contact/></Layout>}/>
      </Routes></AuthProvider>;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<HashRouter><App/></HashRouter>);
  </script>
</body>
</html>
